name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-artifacts:
    runs-on: ubuntu-latest
    needs: build # Optional: run in parallel if independent, but let's keep it clean
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client (with multi-arch support)
        run: npx prisma generate

      - name: Build Next.js application
        run: npm run build

      - name: Prepare Standalone Package
        run: |
          mkdir -p dist
          # Create structure for packaging
          # The standalone folder needs specific files copied into it to be runnable
          
          # 1. Base Standalone
          cp -r .next/standalone dist/app
          
          # 2. Static files (Next.js requires these to be in .next/static)
          mkdir -p dist/app/.next/static
          cp -r .next/static/* dist/app/.next/static/
          
          # 3. Public files
          mkdir -p dist/app/public
          cp -r public/* dist/app/public/
          
          # 4. Copy Prisma Schema (Required for DB migrations)
          cp -r prisma dist/app/prisma
          
          # 5. Create start script
          echo '#!/bin/sh' > dist/app/start.sh
          echo 'export DATABASE_URL=${DATABASE_URL:-"file:./dev.db"}' >> dist/app/start.sh
          echo 'echo "Using DATABASE_URL: $DATABASE_URL"' >> dist/app/start.sh
          echo '# Auto-init database if missing (requires internet to fetch prisma if not installed)' >> dist/app/start.sh
          echo 'if [ ! -f "dev.db" ] && [ "$DATABASE_URL" = "file:./dev.db" ]; then' >> dist/app/start.sh
          echo '  echo "Database file not found. Attempting to initialize..."' >> dist/app/start.sh
          echo '  if command -v npx >/dev/null; then' >> dist/app/start.sh
          echo '    npx prisma@5.22.0 db push' >> dist/app/start.sh
          echo '    node prisma/seed.js' >> dist/app/start.sh
          echo '  else' >> dist/app/start.sh
          echo '    echo "Warning: npx not found. Please manually initialize the database."' >> dist/app/start.sh

          echo '  fi' >> dist/app/start.sh
          echo 'fi' >> dist/app/start.sh
          echo 'exec node server.js' >> dist/app/start.sh
          chmod +x dist/app/start.sh
          
          # Create archive
          cd dist
          tar -czf ../rectification-system-standalone.tar.gz app
          cd ..
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: standalone-package
          path: rectification-system-standalone.tar.gz
          retention-days: 5

